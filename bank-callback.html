<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pip Bills — Bankkoppeling</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080c14;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #0d1322;
      border: 1px solid #1e2a3a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
    }
    .pip-dot {
      width: 48px; height: 48px;
      background: #16a34a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; color: #fff; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #64748b; line-height: 1.6; }
    .error { color: #f87171; margin-top: 1rem; font-size: 0.875rem; }

    .open-btn {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.75rem 2rem;
      background: #16a34a;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .open-btn:hover { background: #15803d; }

    .hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="pip-dot">P</div>

  <div id="success-view" style="display:none">
    <h1>Toestemming gegeven</h1>
    <p>Klik op de knop om terug te gaan naar Pip Bills.</p>
    <a id="open-btn" class="open-btn" href="#">Open Pip Bills</a>
    <p class="hint">Als Pip Bills al open is, klik dan op de knop.</p>
  </div>

  <div id="error-view" style="display:none">
    <h1>Koppeling mislukt</h1>
    <p id="error-msg" class="error"></p>
    <p class="hint" style="margin-top:1rem">Sluit dit venster en probeer opnieuw vanuit de app.</p>
  </div>
</div>

<script>
  const params    = new URLSearchParams(window.location.search)
  const code      = params.get('code')
  const state     = params.get('state')
  const error     = params.get('error')
  const errorDesc = params.get('error_description')

  if (error) {
    document.getElementById('error-view').style.display = 'block'
    document.getElementById('error-msg').textContent =
      errorDesc || error || 'Onbekende fout bij de bankkoppeling.'
  } else if (code && state) {
    const deepLink = `pip-bills://bank-callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`
    const btn = document.getElementById('open-btn')
    btn.href = deepLink
    document.getElementById('success-view').style.display = 'block'

    // Probeer automatisch te openen — werkt niet altijd in Chrome zonder interactie
    // De knop is de betrouwbare fallback
    btn.addEventListener('click', (e) => {
      e.preventDefault()
      window.location.href = deepLink
    })
  } else {
    document.getElementById('error-view').style.display = 'block'
    document.getElementById('error-msg').textContent = 'Ongeldige callback — ontbrekende parameters.'
  }
</script>
</body>
</html>
