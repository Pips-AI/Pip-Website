<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pip Bills — Bankkoppeling</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080c14;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #0d1322;
      border: 1px solid #1e2a3a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
    }
    .pip-dot {
      width: 48px; height: 48px;
      background: #16a34a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; color: #fff; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #64748b; line-height: 1.6; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e2a3a;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #f87171; margin-top: 1rem; font-size: 0.875rem; }
    .fallback { display: none; margin-top: 1.5rem; }
    .fallback p { color: #94a3b8; font-size: 0.85rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="pip-dot">P</div>
  <div id="loading">
    <h1>Bankkoppeling wordt afgerond</h1>
    <p>Pip Bills openen&hellip;</p>
    <div class="spinner"></div>
  </div>
  <div id="error-view" style="display:none">
    <h1>Koppeling mislukt</h1>
    <p id="error-msg" class="error"></p>
  </div>
  <div class="fallback" id="fallback">
    <p>Pip Bills is niet automatisch geopend.<br>Ga terug naar de app en probeer opnieuw.</p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search)
  const code  = params.get('code')
  const state = params.get('state')
  const error = params.get('error')
  const errorDesc = params.get('error_description')

  if (error) {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('error-view').style.display = 'block'
    document.getElementById('error-msg').textContent =
      errorDesc || error || 'Onbekende fout bij de bankkoppeling.'
  } else if (code && state) {
    const deepLink = `pip-bills://bank-callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`
    window.location.href = deepLink

    setTimeout(() => {
      document.getElementById('fallback').style.display = 'block'
    }, 3000)
  } else {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('error-view').style.display = 'block'
    document.getElementById('error-msg').textContent = 'Ongeldige callback — ontbrekende parameters.'
  }
</script>
</body>
</html>
